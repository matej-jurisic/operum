global:
    scrape_interval: 5s

scrape_configs:
    - job_name: "backend"
      metrics_path: /metrics
      static_configs:
          - targets: ["backend:5000"]

    - job_name: "node_exporter"
      static_configs:
          - targets: ["node_exporter:9100"]

    - job_name: "postgres_exporter"
      static_configs:
          - targets: ["postgres_exporter:9187"]

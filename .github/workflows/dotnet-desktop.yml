name: .NET Core CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.203'

    - name: Restore dependencies
      run: dotnet restore backend/src/Operum.sln

    - name: Load env
      run: |
        echo "JwtSettings__Key=${{ secrets.JWT_KEY }}" >> $GITHUB_ENV
        echo "JwtSettings__Issuer=${{ secrets.JWT_ISSUER }}" >> $GITHUB_ENV
        echo "JwtSettings__Audience=${{ secrets.JWT_AUDIENCE }}" >> $GITHUB_ENV

    - name: Build
      run: dotnet build backend/src/Operum.sln --no-restore

    - name: Run tests
      run: dotnet test backend/src/Operum.sln --no-build
